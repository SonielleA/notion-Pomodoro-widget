<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pomodoro Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --black: #000000;
      --overlay: rgba(0, 0, 0, 0.4);
      --glass: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      /* This allows the widget to respond to its own size */
      container-type: inline-size;
    }

    .widget-container {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .widget-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--overlay);
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      text-align: center;
      color: var(--white);
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 1.5cqh; /* Scales gap based on container height */
    }

    /* SCALEABLE TYPOGRAPHY */
    #pomodoro-timer {
      /* Scales from 40px to 120px based on widget width */
      font-size: clamp(40px, 25cqw, 120px); 
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    .mode-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: clamp(10px, 3cqw, 13px);
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--white);
      color: var(--black);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    #start-btn {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 10px 30px;
      border-radius: 40px;
      font-weight: 700;
      font-size: clamp(12px, 4cqw, 16px);
      text-transform: uppercase;
      cursor: pointer;
    }

    .icon-btn {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
      width: clamp(35px, 10cqw, 45px);
      height: clamp(35px, 10cqw, 45px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .theme-toggle {
      position: absolute;
      bottom: 15px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 9px;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 20;
    }
  </style>
</head>
<body>

<div class="widget-container" id="bg-container"></div>

<div class="content-wrapper">
  <div class="mode-row">
    <button class="mode-btn active" onclick="setTimer(25, this)">Pomo</button>
    <button class="mode-btn" onclick="setTimer(5, this)">Short</button>
    <button class="mode-btn" onclick="setTimer(15, this)">Long</button>
  </div>

  <div id="pomodoro-timer">25:00</div>

  <div class="actions">
    <button id="start-btn" onclick="toggleTimer()">Start</button>
    <button class="icon-btn" onclick="resetTimer()">↻</button>
  </div>
</div>

<button class="theme-toggle" id="theme-btn" onclick="nextImage()">Next BG</button>

<script>
  const images = [
    'https://i.postimg.cc/TYdjG7vX/9436360760a3dad98fa314735315ccc4.jpg',
    'https://i.postimg.cc/SNSLqTbN/download.jpg',
    'https://i.postimg.cc/fRPXVbsv/download-(1).jpg, 
    'https://i.postimg.cc/pLS8mdvZ/download-(2).jpg’,
    'https://i.postimg.cc/7ZR75L49/download-(3).jpg’, 
    'https://i.postimg.cc/9QkTDf2t/image.jpg’, 
    'https://i.postimg.cc/pLS8mdvk/shgdb.jpg’,
    'https://i.postimg.cc/HsY0HZ1Y/fc3071b2bb7d6bbc216b31f0dd534d2b.jpg'
  ];
  
  let currentImgIndex = 0;
  const bgContainer = document.getElementById('bg-container');
  bgContainer.style.backgroundImage = `url('${images[currentImgIndex]}')`;

  function nextImage() {
    currentImgIndex = (currentImgIndex + 1) % images.length;
    bgContainer.style.backgroundImage = `url('${images[currentImgIndex]}')`;
  }

  let defaultMins = 25;
  let timeLeft = defaultMins * 60;
  let timerId = null;
  let isRunning = false;
  const display = document.getElementById('pomodoro-timer');
  const startBtn = document.getElementById('start-btn');

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function setTimer(mins, btn) {
    defaultMins = mins;
    resetTimer();
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function toggleTimer() {
    if (isRunning) {
      clearInterval(timerId);
      startBtn.textContent = 'Start';
    } else {
      timerId = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          alert("Time's up!");
        }
      }, 1000);
      startBtn.textContent = 'Pause';
    }
    isRunning = !isRunning;
  }

  function resetTimer() {
    clearInterval(timerId);
    isRunning = false;
    startBtn.textContent = 'Start';
    timeLeft = defaultMins * 60;
    updateDisplay();
  }
</script>

</body>
</html>
